            color: wheat;
            border: 1px solid white;
            margin-right: 10px;
            margin-bottom: 5px;
            padding: 5px;
            display:block;
            width: 20%;

        a:hover{
            background-color: white;

            body{
                background-color: black;
            }
            a{
                display: block;
            }

        }


    </style>
