<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        #pic1{
            display: none;
        }
    </style>
    <script>
        function show(){
            document.getElementByTd("pic1").style.display="block"
        }
         function show2(){
            document.getElementByTd("pic1").style.display="none"
        }

    </script>
</head>
<body>
    <button onclick="show()"ondblclick="show2()">
        click Here
    </button>
    <img src="images/ไฟ (1).jpg"width="200px "height="200px">
</body>
</html>
