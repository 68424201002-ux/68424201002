<head>

    <style>
        .box{
            position: relative;
        }
        .content{
            display: none;
            position: absolute;
            background-color: white;
            color: black;
            left: 10px;
        }
        .box:hover .content{
            display: block;
        }

    </style>
</head>
<body>

            <ul class="content">
                <li>การบ้าน1</li>
                <li>การบ้าน2</li>

        </li>

            </ul>
        </li>
    </ul>
</body>
</html>
